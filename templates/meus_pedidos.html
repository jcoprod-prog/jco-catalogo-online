<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pedidos - Mercadinho Oliveira</title>
    <link rel="stylesheet" href="/static/css/catalogo.css?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .pedidos-container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .pedido-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .pedido-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .pedido-header h3 { margin: 0; color: #333; }
        .status { font-weight: bold; padding: 5px 10px; border-radius: 20px; font-size: 0.85em; text-transform: uppercase; }
        /* Cores dos status */
        .status-pendente { background: #fff3cd; color: #856404; }
        .status-aceito { background: #d4edda; color: #155724; }
        .status-cancelado { background: #f8d7da; color: #721c24; }
        
        .item-lista { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95em; color: #555; }
        .total-pedido { font-weight: bold; font-size: 1.1em; text-align: right; margin-top: 15px; color: #28a745; border-top: 1px solid #eee; padding-top: 10px;}
        .btn-voltar { display: inline-block; margin-bottom: 20px; color: #ff6600; text-decoration: none; font-weight: bold; font-size: 1.1em;}
    </style>
</head>
<body style="background-color: #f4f4f9;">
    <div class="pedidos-container">
        <a href="/" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar à Loja</a>
        <h2><i class="fas fa-receipt"></i> Acompanhar Meus Pedidos</h2>
        <div id="lista-pedidos">
            <p>Buscando seus pedidos...</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const listaDiv = document.getElementById('lista-pedidos');
            // Pega os IDs da memória do celular
            const orderIds = JSON.parse(localStorage.getItem('jcoMeusPedidos')) || [];

            if (orderIds.length === 0) {
                listaDiv.innerHTML = '<p>Você ainda não fez nenhum pedido no nosso mercadinho.</p>';
                return;
            }

            try {
                // Manda os IDs para o Python buscar
                const response = await fetch('/api/meus_pedidos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_ids: orderIds })
                });
                
                if (!response.ok) throw new Error('Falha ao carregar.');
                const pedidos = await response.json();
                
                if (pedidos.length === 0) {
                    listaDiv.innerHTML = '<p>Nenhum pedido encontrado.</p>';
                    return;
                }

                listaDiv.innerHTML = ''; // Limpa o "Buscando..."
                
                pedidos.forEach(pedido => {
                    // Define a cor da etiqueta baseada no status
                    const statusAtual = (pedido.status || 'pendente').toLowerCase();
                    const statusClass = `status-${statusAtual}`;
                    
                    let itensHtml = '';
                    pedido.itens_detalhados.forEach(item => {
                        const subtotal = item.quantidade * item.preco_unitario;
                        itensHtml += `
                            <div class="item-lista">
                                <span>${item.quantidade}x ${item.nome}</span>
                                <span>R$ ${subtotal.toFixed(2).replace('.', ',')}</span>
                            </div>
                        `;
                    });

                    const card = document.createElement('div');
                    card.className = 'pedido-card';
                    card.innerHTML = `
                        <div class="pedido-header">
                            <h3>Pedido #${pedido.id}</h3>
                            <span class="status ${statusClass}">${statusAtual}</span>
                        </div>
                        <div class="pedido-itens">
                            ${itensHtml}
                        </div>
                        <div class="total-pedido">
                            Total: R$ ${parseFloat(pedido.total).toFixed(2).replace('.', ',')}
                        </div>
                    `;
                    listaDiv.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                listaDiv.innerHTML = '<p style="color:red;">Erro ao buscar seus pedidos. Tente atualizar a página.</p>';
            }
        });
    </script>
</body>
</html>
