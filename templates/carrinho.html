<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho - JCO Vendas</title>

    <!-- INÍCIO DA CORREÇÃO 1: Passa as variáveis do Supabase para o JavaScript -->
    <script>
        const SUPABASE_URL = "{{ config.SUPABASE_URL }}";
        const BUCKET_NAME = "imagens-projeto";
    </script>
    <!-- FIM DA CORREÇÃO 1 -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Estilos base */
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; margin: 0; background-color: #f4f7f9; color: #333; }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; background-color: #fff; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        header h1 { font-size: 2em; color: #2c3e50; text-align: center; margin-bottom: 20px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #007bff; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }

        /* Estilos do Carrinho */
        .cart-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #e0e0e0; gap: 15px; }
        .cart-item:last-child { border-bottom: none; }
        .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
        .cart-item-details { flex-grow: 1; }
        .cart-item-details h4 { margin: 0 0 5px; font-size: 1.1em; }
        .item-price, .item-subtotal { margin: 0; color: #555; }
        .item-subtotal strong { color: #333; }
        .quantity-selector { display: flex; align-items: center; gap: 10px; }
        .quantity-btn { background-color: #e9ecef; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 1.2em; line-height: 1; }
        .quantity-btn:hover { background-color: #ced4da; }
        
        /* Total e Botão de Finalizar */
        .cart-summary { margin-top: 20px; text-align: right; }
        #cart-total { font-size: 1.5em; font-weight: bold; }
        #checkout-btn { background-color: #28a745; color: white; border: none; padding: 12px 25px; border-radius: 5px; font-size: 1.1em; cursor: pointer; margin-top: 10px; transition: background-color 0.2s; }
        #checkout-btn:disabled { background-color: #aaa; cursor: not-allowed; }
        #checkout-btn:hover:not(:disabled) { background-color: #218838; }

        /* INÍCIO DA CORREÇÃO 2: Estilos do Modal de Checkout */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background-color: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); width: 90%; max-width: 500px; animation: slide-down 0.3s ease-out; }
        @keyframes slide-down { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-content h2 { margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 1em; }
        .form-group input:focus, .form-group textarea:focus { border-color: #007bff; outline: none; box-shadow: 0 0 0 2px rgba(0,123,255,.25); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .modal-btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; font-weight: bold; }
        .btn-cancel { background-color: #f1f1f1; color: #333; }
        .btn-confirm { background-color: #007bff; color: white; }
        /* FIM DA CORREÇÃO 2 */
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="{{ url_for('catalogo.pagina_catalogo') }}" class="back-link"><i class="fas fa-arrow-left"></i> Voltar ao Catálogo</a>
            <h1><i class="fas fa-shopping-cart"></i> Meu Carrinho</h1>
        </header>

        <div id="cart-items-container">
            <p>Carregando itens do carrinho...</p>
        </div>

        <div class="cart-summary">
            <h3>Total: <span id="cart-total">R$ 0,00</span></h3>
            <button id="checkout-btn">Finalizar Pedido</button>
        </div>
    </div>

    <!-- Modal de Checkout -->
    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <h2>Informações para Entrega</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label for="client-name">Seu Nome:</label>
                    <input type="text" id="client-name" required placeholder="Digite seu nome">
                </div>
                <div class="form-group">
                    <label for="client-address">Seu Endereço:</label>
                    <input type="text" id="client-address" required placeholder="Rua, Número, Bairro, Ponto de Referência">
                </div>
                <div class="form-group">
                    <label for="client-notes">Observações (opcional):</label>
                    <textarea id="client-notes" rows="3" placeholder="Ex: Deixar na portaria, casa com portão azul..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancel-btn" class="modal-btn btn-cancel">Cancelar</button>
                    <button type="submit" id="submit-order-btn" class="modal-btn btn-confirm">Confirmar Pedido</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/carrinho.js') }}"></script>
</body>
</html>
